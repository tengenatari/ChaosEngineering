- name: Установка однонодового k3s cluster
  hosts: k3s-cluster
  become: true

  tasks:
    - name: Обновление списка пакетов
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
    - name: Установка пакетов
      ansible.builtin.apt:
          name:
            - curl
          state: present
    - name: Скачивание и установка k3s
      ansible.builtin.shell: |
          curl -sfL https://get.k3s.io |  sh -
      args:
          creates: /etc/rancher/k3s
      register: k3s_install

    - name: Запуск кластера
      ansible.builtin.shell: |
        systemctl start k3s
      register: k3s_start
    - name: Скачивание и установка helm
      ansible.builtin.shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm
      register: helm_install

    - name: Добавление Harbor
      ansible.builtin.shell: |
          helm repo add harbor https://helm.goharbor.io
          helm repo update
      args:
        creates: /root/.cache/helm/repository/harbor-index.yaml
      register: harbor_repo_add
    - name: Создание namespace для Harbor
      ansible.builtin.command:
        cmd: kubectl create namespace harbor --kubeconfig /etc/rancher/k3s/k3s.yaml
      register: create_ns
      failed_when: false

    - name: Установка Harbor
      ansible.builtin.shell: |
        helm install harbor harbor/harbor \
          --namespace harbor \
          --kubeconfig /etc/rancher/k3s/k3s.yaml \
          --set expose.type=nodePort \
          --set expose.tls.enabled=false \
          --set externalURL=http://{{ ansible_default_ipv4.address }}:30002
      register: harbor_install
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      failed_when: false

    - name: Добавление репозитория Istio
      ansible.builtin.shell: |
        /usr/local/bin/helm repo add istio https://istio-release.storage.googleapis.com/charts
        /usr/local/bin/helm repo update

    - name: Создание namespace для Istio
      ansible.builtin.command:
        cmd: kubectl create namespace istio-system --kubeconfig /etc/rancher/k3s/k3s.yaml
      failed_when: false

    - name: Установка istio-base
      ansible.builtin.shell: |
        /usr/local/bin/helm install istio-base istio/base -n istio-system \
        --kubeconfig /etc/rancher/k3s/k3s.yaml
      failed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Установка istiod
      ansible.builtin.shell: |
        /usr/local/bin/helm install istiod istio/istiod -n istio-system \
          --kubeconfig /etc/rancher/k3s/k3s.yaml \
          --wait
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      ignore_errors: yes
    - name: Add Istio Helm repository
      shell: helm repo add istio https://istio-release.storage.googleapis.com/charts && helm repo update

    - name: Install Istio Ingress Gateway
      shell: |
        helm install istio-ingressgateway istio/gateway -n istio-system \
          --kubeconfig /etc/rancher/k3s/k3s.yaml \
          --set service.type=NodePort \
          --set service.ports[0].name=http2 \
          --set service.ports[0].port=80 \
          --set service.ports[0].targetPort=8080 \
          --set service.ports[0].nodePort=30080 \
          --set service.ports[1].name=https \
          --set service.ports[1].port=443 \
          --set service.ports[1].targetPort=8443 \
          --set service.ports[1].nodePort=30443 \
          --wait
      ignore_errors: yes

    - name: Enable Istio sidecar injection for harbor
      shell: kubectl label namespace harbor istio-injection=enabled --overwrite

    - name: Restart Harbor pods for sidecar injection
      shell: kubectl rollout restart deployment -n harbor
    - name: Создание Gateway для Harbor
      ansible.builtin.shell: |
        kubectl apply -f - --kubeconfig /etc/rancher/k3s/k3s.yaml <<EOF
        apiVersion: networking.istio.io/v1beta1
        kind: Gateway
        metadata:
          name: harbor-gateway
          namespace: harbor
        spec:
          selector:
            app: istio-ingressgateway
          servers:
          - port:
              number: 80
              name: http
              protocol: HTTP
            hosts:
            - "*"
        EOF

    - name: Создание VirtualService для маршрутизации в Harbor
      ansible.builtin.shell: |
        kubectl apply -f - --kubeconfig /etc/rancher/k3s/k3s.yaml <<EOF
        apiVersion: networking.istio.io/v1beta1
        kind: VirtualService
        metadata:
          name: harbor-vs
          namespace: harbor
        spec:
          hosts:
          - "*"
          gateways:
          - harbor-gateway
          http:
          - match:
            - uri:
                prefix: /
            route:
            - destination:
                host: harbor
                port:
                  number: 80
        EOF