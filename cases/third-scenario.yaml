apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: harbor-registry-delay
  namespace: harbor
spec:
  hosts:
    - harbor-registry
  http:
    - fault:
        delay:
          percentage:
            value: 100
          fixedDelay: 3s
      route:
        - destination:
            host: harbor-registry
            port:
              number: 5000